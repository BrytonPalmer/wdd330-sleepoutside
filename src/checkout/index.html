<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <header class="divider" id="main-header"></header>

      <main class="divider checkout-page">

        <section class="order-summary">
          <h2>Order Summary</h2>

          <p>Subtotal: $<span id="order-subtotal">0.00</span></p>
          <p>Tax (6%): $<span id="order-tax">0.00</span></p>
          <p>Shipping: $<span id="order-shipping">0.00</span></p>

          <h3>Total: $<span id="order-total">0.00</span></h3>
        </section>

        <section class="checkout-form">
          <h2>Customer Information</h2>

          <form id="checkout-form">

            <label>First Name
              <input type="text" name="fname" required>
            </label>

            <label>Last Name
              <input type="text" name="lname" required>
            </label>

            <label>Street Address
              <input type="text" name="street" required>
            </label>

            <label>City
              <input type="text" name="city" required>
            </label>

            <label>State
              <input type="text" name="state" required>
            </label>

            <label>Zip Code
              <input type="text" name="zip" id="zip" required>
            </label>

            <h2>Payment</h2>

            <label>Credit Card Number
              <input type="text" name="cardNumber" required>
            </label>

            <label>Expiration Date
              <input type="text" name="expiration" required>
            </label>

            <label>Security Code
              <input type="text" name="code" required>
            </label>

            <button type="submit" class="place-order-btn">Place Order</button>
          </form>
        </section>

      </main>


    <footer id="main-footer"></footer>
    <script type="module" src="../js/checkout.js"></script>

  </body>
</html>
